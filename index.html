<!DOCTYPE html>
<html lang="ja">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-JQ9Z49NDNC"></script>

        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};

        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "xebs9pq2lq");

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#7C5CFF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="日記">
<meta name="mobile-web-app-capable" content="yes">
<title>みんなの日記</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
  :root{
    --bg:#faf7f2; --card:#ffffff; --ink:#2b2535; --muted:#8a8398;
    --line:#ece6db; --accent:#7C5CFF; --accent-soft:#efeaff;
    --pink:#FF7DA8; --green:#5FC9A0;
    --shadow:0 4px 18px rgba(60,40,90,.08);
    --radius:18px; --maxw:680px;
  }
  [data-theme="dark"]{
    --bg:#16131f; --card:#211c2e; --ink:#f0ecf7; --muted:#9d95b3;
    --line:#332b45; --accent:#9d86ff; --accent-soft:#2a2340;
    --shadow:0 4px 22px rgba(0,0,0,.4);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,"Hiragino Sans","Yu Gothic UI","Segoe UI",sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.6;
    padding-bottom:env(safe-area-inset-bottom); -webkit-text-size-adjust:100%;
  }
  .wrap{max-width:var(--maxw); margin:0 auto; padding:0 16px 120px}
  header{
    position:sticky; top:0; z-index:30; background:var(--bg);
    padding:14px 16px 10px; max-width:var(--maxw); margin:0 auto;
    display:flex; align-items:center; gap:8px;
    padding-top:calc(14px + env(safe-area-inset-top));
  }
  header .title{flex:1; min-width:0}
  .titlebtn{border:none; background:transparent; text-align:left; cursor:pointer; padding:0; color:var(--ink); font-family:inherit}
  .caret{font-size:13px; color:var(--muted); vertical-align:middle}
  header .title h1{font-size:18px; margin:0; letter-spacing:.02em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  header .title .sub{font-size:12px; color:var(--muted)}
  .iconbtn{
    width:40px; height:40px; border:none; border-radius:12px; flex:0 0 auto;
    background:var(--card); color:var(--ink); font-size:18px; cursor:pointer;
    box-shadow:var(--shadow); display:grid; place-items:center;
  }
  .syncdot{font-size:11px; color:var(--muted)}

  .notebar{
    display:flex; gap:8px; overflow-x:auto; padding:2px 16px 10px; max-width:var(--maxw); margin:0 auto;
    -webkit-overflow-scrolling:touch; scrollbar-width:none;
  }
  .notebar::-webkit-scrollbar{display:none}
  .nbchip{
    border:1.5px solid var(--line); background:var(--card); color:var(--ink);
    border-radius:99px; padding:7px 15px; font-size:14px; white-space:nowrap; cursor:pointer; flex:0 0 auto; font-weight:600;
  }
  .nbchip.sel{background:var(--accent); color:#fff; border-color:var(--accent)}
  .nbchip.add{color:var(--accent); border-style:dashed}

  .entry{background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); padding:16px; margin-bottom:14px; position:relative}
  .entry .top{display:flex; align-items:baseline; gap:8px; margin-bottom:8px; flex-wrap:wrap}
  .entry .date{font-weight:700; font-size:16px}
  .entry .dow{color:var(--muted); font-size:13px}
  .entry .badges{margin-left:auto; display:flex; gap:6px; font-size:15px}
  .entry .body{white-space:pre-wrap; word-break:break-word; font-size:15px}
  .entry .meta{margin-top:10px; font-size:13px; color:var(--muted); display:grid; gap:3px}
  .entry .meta b{color:var(--ink); font-weight:600}
  .entry .tags{margin-top:8px; display:flex; gap:6px; flex-wrap:wrap}
  .tag{background:var(--accent-soft); color:var(--accent); font-size:12px; padding:2px 9px; border-radius:99px; font-weight:600}
  .daygroup{font-size:13px; font-weight:700; color:var(--muted); margin:18px 4px 8px; letter-spacing:.03em}
  .trashhead{font-size:13px; font-weight:700; color:var(--muted); margin:26px 4px 8px; padding-top:14px; border-top:1px dashed var(--line); letter-spacing:.02em}
  .trashitem{display:flex; align-items:center; gap:10px; background:var(--card); border:1px solid var(--line); border-radius:12px; padding:10px 12px; margin-bottom:8px; opacity:.85}
  .trashitem .ttext{flex:1; min-width:0; display:flex; flex-direction:column}
  .trashitem .tdate{font-size:12px; color:var(--muted)}
  .trashitem .tbody{font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .trashitem .tacts{flex:0 0 auto; display:flex; gap:6px}
  .tbtn{border:1.5px solid var(--line); background:var(--bg); color:var(--ink); border-radius:9px; padding:7px 11px; font-size:13px; font-weight:600; cursor:pointer}
  .tbtn.restore{border-color:var(--accent); color:var(--accent)}
  .tbtn.purge{border-color:var(--pink); color:var(--pink)}
  .empty{text-align:center; color:var(--muted); padding:60px 20px}
  .empty .big{font-size:48px}

  .fab{
    position:fixed; right:20px; bottom:calc(24px + env(safe-area-inset-bottom));
    width:62px; height:62px; border-radius:50%; border:none; cursor:pointer;
    background:linear-gradient(135deg,var(--accent),var(--pink)); color:#fff;
    font-size:30px; line-height:1; box-shadow:0 8px 24px rgba(124,92,255,.4); z-index:40;
  }

  .sheet-bg{position:fixed; inset:0; background:rgba(20,15,30,.45); z-index:50; opacity:0; pointer-events:none; transition:opacity .2s}
  .sheet-bg.on{opacity:1; pointer-events:auto}
  .sheet{
    position:fixed; left:0; right:0; bottom:0; z-index:51; background:var(--card);
    border-radius:24px 24px 0 0; max-width:var(--maxw); margin:0 auto;
    transform:translateY(100%); transition:transform .28s cubic-bezier(.2,.8,.2,1);
    max-height:92vh; overflow-y:auto; padding:8px 18px calc(24px + env(safe-area-inset-bottom));
  }
  .sheet.on{transform:translateY(0)}
  .editsheet{display:flex; flex-direction:column; height:88vh; padding-bottom:0; overflow:hidden}
  .editsheet h2{flex:0 0 auto}
  .editsheet .grab{flex:0 0 auto}
  .sheetbody{flex:1 1 auto; overflow-y:auto; -webkit-overflow-scrolling:touch; padding-bottom:8px}
  .sheetfoot{flex:0 0 auto; display:flex; gap:10px; padding:10px 0 calc(12px + env(safe-area-inset-bottom)); border-top:1px solid var(--line); background:var(--card)}
  .btn.slim{padding:10px; font-size:15px}
  .grab{width:42px; height:5px; background:var(--line); border-radius:9px; margin:8px auto 14px}
  .sheet h2{margin:0 0 14px; font-size:18px}
  label.fld{display:block; margin-bottom:14px}
  label.fld .lab{display:block; font-size:13px; color:var(--muted); margin-bottom:5px; font-weight:600}
  input[type=text],input[type=date],input[type=password],textarea,select{
    width:100%; border:1.5px solid var(--line); background:var(--bg); color:var(--ink);
    border-radius:12px; padding:11px 13px; font-size:16px; font-family:inherit;
  }
  textarea{resize:vertical; min-height:90px; line-height:1.6}
  input:focus,textarea:focus,select:focus{outline:none; border-color:var(--accent)}
  .chiprow{display:flex; gap:8px; flex-wrap:wrap}
  .chip{border:1.5px solid var(--line); background:var(--bg); color:var(--ink); border-radius:12px; padding:9px 12px; font-size:18px; cursor:pointer; flex:1; min-width:64px; text-align:center}
  .chip small{display:block; font-size:11px; color:var(--muted); margin-top:2px}
  .chip.sel{border-color:var(--accent); background:var(--accent-soft)}
  .placelist{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:8px}
  .placelist:empty{margin-bottom:0}
  .placepill{display:inline-flex; align-items:center; gap:5px; background:var(--accent-soft); color:var(--accent); border-radius:99px; padding:5px 6px 5px 12px; font-size:14px; font-weight:600}
  .placepill button{border:none; background:transparent; color:var(--accent); cursor:pointer; font-size:15px; line-height:1; padding:0 2px}
  .placeadd{display:flex; gap:8px}
  .placeadd input{flex:1}
  .placeadd .btn{flex:0 0 auto; padding:11px 16px}
  .btnrow{display:flex; gap:10px; margin-top:6px}
  .btn{flex:1; border:none; border-radius:13px; padding:14px; font-size:16px; font-weight:700; cursor:pointer}
  .btn.primary{background:var(--accent); color:#fff}
  .btn.ghost{background:var(--bg); color:var(--ink); border:1.5px solid var(--line)}
  .btn.danger{background:transparent; color:var(--pink); border:1.5px solid var(--pink)}
  .setrow{display:flex; align-items:center; gap:10px; padding:12px 0; border-bottom:1px solid var(--line)}
  .setrow:last-child{border-bottom:none}
  .setrow .t{flex:1} .setrow .t b{display:block} .setrow .t span{font-size:12px; color:var(--muted)}
  .urlmini{font-family:ui-monospace,monospace; word-break:break-all}
  .userrow{display:flex; align-items:center; gap:12px; width:100%; text-align:left; border:1.5px solid var(--line); background:var(--card); color:var(--ink); border-radius:14px; padding:12px 14px; margin-bottom:10px; cursor:pointer; font-family:inherit}
  .userrow.cur{border-color:var(--accent); background:var(--accent-soft)}
  .uravatar{flex:0 0 auto; width:38px; height:38px; border-radius:50%; background:var(--accent); color:#fff; display:grid; place-items:center; font-weight:700; font-size:17px}
  .urtext{flex:1; min-width:0; display:flex; flex-direction:column}
  .urtext b{font-size:15px}
  .urtext .urlmini{font-size:11px; color:var(--muted)}
  .urcheck{flex:0 0 auto; color:var(--accent); font-weight:700; font-size:18px; width:20px; text-align:center}
  /* settings grouped cards */
  .setgroup{font-size:13px; font-weight:700; color:var(--muted); margin:20px 6px 7px; letter-spacing:.02em}
  .card{background:var(--card); border:1px solid var(--line); border-radius:14px; overflow:hidden}
  .card .row{display:flex; align-items:center; gap:10px; width:100%; padding:13px 15px; border-bottom:1px solid var(--line); background:transparent; color:var(--ink); font-family:inherit; font-size:15px; text-align:left}
  .card .row:last-child{border-bottom:none}
  .card .row.tap{cursor:pointer; border-width:0 0 1px 0; border-style:solid; border-color:var(--line)}
  .card .row.tap:last-child{border-bottom:none}
  .card .row.tap:active{background:var(--accent-soft)}
  .card .row.col{flex-direction:column; align-items:stretch; gap:9px}
  .rlabel{flex:1}
  .rlabel.accent{color:var(--accent); font-weight:600}
  .rlabel.danger{color:var(--pink); font-weight:600}
  .rval{color:var(--muted); max-width:60%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .rtext{flex:1; display:flex; flex-direction:column}
  .rtext b{font-weight:600} .rtext small{color:var(--muted); font-size:12px; margin-top:2px}
  .chev{flex:0 0 auto; color:var(--muted); font-size:18px}
  .rinput{width:100%; border:1.5px solid var(--line); background:var(--bg); color:var(--ink); border-radius:10px; padding:10px 12px; font-size:15px; font-family:ui-monospace,monospace}
  .urlwrap{position:relative; display:flex; align-items:center}
  .urlwrap .rinput{padding-right:38px}
  .urlclear{position:absolute; right:6px; width:26px; height:26px; border:none; border-radius:50%; background:var(--line); color:var(--ink); cursor:pointer; font-size:13px; display:grid; place-items:center; opacity:.8}
  .urlclear:active{opacity:1}
  .urlrow{display:flex; gap:8px; align-items:stretch}
  .urlrow .urlwrap{flex:1}
  .connectbtn{flex:0 0 auto; padding:0 16px; border-radius:10px}
  #newNoteBtn{border-top:1px solid var(--line)}
  .btn.block{width:100%}
  .cardnote{font-size:12px; color:var(--muted); margin:7px 6px 0; line-height:1.5}
  #noteList .setrow{padding:13px 15px; border-bottom:1px solid var(--line); margin:0}
  .card .row.selrow{background:var(--accent-soft)}
  .uravatar.sm{width:30px; height:30px; font-size:14px}
  .card .row.noterow{display:flex; align-items:center; gap:8px}
  .noterow .rlabel{cursor:pointer}
  .miniedit{flex:0 0 auto; border:none; background:transparent; cursor:pointer; font-size:15px; opacity:.6; padding:2px 4px}
  .miniedit:active{opacity:1}
  .seclabel{font-size:12px; font-weight:700; color:var(--muted); margin:18px 0 4px; letter-spacing:.05em}
  .toast{position:fixed; left:50%; transform:translateX(-50%); bottom:90px; z-index:120; background:var(--ink); color:var(--bg); padding:11px 18px; border-radius:99px; font-size:14px; opacity:0; pointer-events:none; transition:opacity .25s, transform .25s; white-space:nowrap}
  .toast.on{opacity:1; transform:translateX(-50%) translateY(-6px)}
  .search{width:100%; border:none; background:var(--card); box-shadow:var(--shadow); border-radius:13px; padding:11px 15px; font-size:15px; color:var(--ink); margin-bottom:6px}
  .search::placeholder{color:var(--muted)}

  #lock{position:fixed; inset:0; z-index:200; background:var(--bg); display:none; flex-direction:column; align-items:center; justify-content:center; padding:24px; text-align:center}
  #lock.on{display:flex}
  #lock .big{font-size:64px; margin-bottom:8px}
  #lock h2{margin:0 0 4px}
  #lock p{color:var(--muted); margin:0 0 22px; font-size:14px}
  #lock .box{width:100%; max-width:300px}
  #lock input{text-align:center; font-size:18px; letter-spacing:.1em}
  #lock .err{color:var(--pink); font-size:13px; min-height:18px; margin-top:8px}
</style>
</head>
<body>

<div id="lock">
  <div class="big">🔒</div>
  <h2>合言葉</h2>
  <p>このアプリはロックされています</p>
  <div class="box">
    <input type="password" id="lockInput" placeholder="合言葉を入力" autocomplete="off">
    <div class="err" id="lockErr"></div>
    <button class="btn primary" id="lockBtn" style="width:100%;margin-top:6px">開く</button>
  </div>
</div>

<header>
  <button class="title titlebtn" id="userBtn">
    <h1 id="hUser">日記 <span class="caret">▾</span></h1>
    <div class="sub" id="hNote">—</div>
  </button>
  <span class="syncdot" id="syncDot"></span>
  <button class="iconbtn" id="themeBtn" title="テーマ">🌙</button>
  <button class="iconbtn" id="setBtn" title="設定">⚙️</button>
</header>

<div class="notebar" id="notebar"></div>

<div class="wrap">
  <input class="search" id="search" placeholder="🔍 本文・タグで検索">
  <div id="list"></div>
</div>

<button class="fab" id="addBtn" aria-label="新しい日記">＋</button>

<div class="sheet-bg" id="sheetBg"></div>
<div class="sheet editsheet" id="editSheet">
  <div class="grab"></div>
  <h2 id="editTitle">今日の日記</h2>
  <div class="sheetbody">
  <label class="fld"><span class="lab">日付</span><input type="date" id="fDate"></label>
  <label class="fld"><span class="lab">天気（複数えらべる）</span><div class="chiprow" id="weatherChips"></div></label>
  <label class="fld"><span class="lab">気分（複数えらべる）</span><div class="chiprow" id="moodChips"></div></label>
  <label class="fld"><span class="lab">行った場所</span>
    <div id="placeList" class="placelist"></div>
    <div class="placeadd"><input type="text" id="placeInput" placeholder="場所を入力（例: 公園）"><button type="button" class="btn ghost" id="placeAddBtn">追加</button></div>
  </label>
  <label class="fld"><span class="lab">今日の出来事</span><textarea id="fBody" placeholder="今日あったことを書こう"></textarea></label>
  <label class="fld"><span class="lab">新しく知ったこと</span><textarea id="fLearned" placeholder="今日はじめて知ったこと"></textarea></label>
  <label class="fld"><span class="lab">覚えたこと・できるようになったこと</span><textarea id="fMemorized" placeholder="できるようになったこと・覚えたこと"></textarea></label>
  <label class="fld"><span class="lab">感謝したこと</span><textarea id="fThanks" placeholder="ありがとう、と思ったこと"></textarea></label>
  <label class="fld"><span class="lab">明日の目標</span><input type="text" id="fGoal" placeholder="明日がんばること"></label>
  <label class="fld"><span class="lab">タグ（スペース区切り）</span><input type="text" id="fTags" placeholder="#学校 #遊び"></label>
  </div>
  <div class="sheetfoot">
    <button class="btn ghost slim" id="cancelBtn">閉じる</button>
    <button class="btn danger slim" id="delBtn" style="display:none">消す</button>
    <button class="btn primary slim" id="saveBtn">保存</button>
  </div>
</div>

<div class="sheet-bg" id="userBg"></div>
<div class="sheet" id="userSheet">
  <div class="grab"></div>
  <h2>👥 ユーザー切替</h2>
  <div id="userList"></div>
  <p style="font-size:12px;color:var(--muted);margin:12px 4px 0">
    ユーザーの追加・削除は設定（⚙️）でできます。
  </p>
</div>

<div class="sheet-bg" id="setBg"></div>
<div class="sheet editsheet" id="setSheet">
  <div class="grab"></div>
  <h2>⚙️ 設定</h2>
  <div class="sheetbody">

  <!-- ユーザー（アカウント） -->
  <div class="setgroup">ユーザー</div>
  <div class="card" id="userSettingsList"></div>
  <div class="card" style="margin-top:10px">
    <div class="row col">
      <span class="rlabel">名前</span>
      <div class="urlwrap">
        <input type="text" id="cfgName" class="rinput" placeholder="かなお" style="font-family:inherit">
        <button type="button" class="urlclear" id="nameClearBtn" title="クリア">✕</button>
      </div>
    </div>
    <div class="row col">
      <span class="rlabel">GAS ウェブアプリ URL</span>
      <div class="urlrow">
        <div class="urlwrap">
          <input type="text" id="cfgUrl" class="rinput" placeholder="https://script.google.com/macros/s/.../exec">
          <button type="button" class="urlclear" id="urlClearBtn" title="クリア">✕</button>
        </div>
        <button class="btn primary connectbtn" id="connectBtn">接続</button>
      </div>
    </div>
  </div>
  <p class="cardnote">名前とURLを入れて「接続」を押すと、このユーザーに登録されます。GASに名前が登録済みなら自動で反映されます。</p>

  <!-- 日記帳 -->
  <div class="setgroup">日記帳</div>
  <div class="card" id="noteCard">
    <div id="noteList"></div>
    <div class="row col" id="newNoteRow" style="display:none">
      <span class="rlabel">新しい日記帳の名前</span>
      <input type="text" id="newNoteInput" class="rinput" placeholder="例: べんきょう日記" style="font-family:inherit">
      <div style="display:flex;gap:8px">
        <button class="btn ghost block" id="newNoteCancel">やめる</button>
        <button class="btn primary block" id="newNoteSave">作成</button>
      </div>
    </div>
    <button class="row tap" id="newNoteBtn"><span class="rlabel accent">＋ 新しい日記を追加</span><span class="chev">›</span></button>
    <button class="row tap" id="refreshNotesBtn"><span class="rlabel">一覧を更新</span><span class="chev">↻</span></button>
  </div>

  <!-- 同期 -->
  <div class="setgroup">同期</div>
  <div class="card">
    <button class="row tap" id="syncBtn"><span class="rtext"><b>クラウドと同期</b><small>ローカルとスプレッドシートをマージ</small></span><span class="chev">⟳</span></button>
    <button class="row tap" id="pullBtn"><span class="rtext"><b>取得</b><small>クラウドでローカルを上書き</small></span><span class="chev">↓</span></button>
    <button class="row tap" id="pushBtn"><span class="rtext"><b>送信</b><small>ローカルでクラウドを上書き</small></span><span class="chev">↑</span></button>
  </div>

  <!-- ロック -->
  <div class="setgroup">ロック</div>
  <div class="card">
    <button class="row tap" id="lockToggleBtn"><span class="rtext"><b>アプリのロック</b><small id="lockState">ロックなし</small></span><span class="chev" id="lockChev">›</span></button>
  </div>

  <!-- バックアップ -->
  <div class="setgroup">バックアップ</div>
  <div class="card">
    <button class="row tap" id="exportBtn"><span class="rlabel">JSONに書き出し</span><span class="chev">›</span></button>
    <button class="row tap" id="importBtn"><span class="rlabel">JSONから読み込み</span><span class="chev">›</span></button>
  </div>
  <input type="file" id="importFile" accept=".json" style="display:none">

  <!-- アプリ -->
  <div class="setgroup">アプリ</div>
  <div class="card">
    <button class="row tap" id="updateAppBtn"><span class="rtext"><b>アプリを更新</b><small id="appVer">最新の状態に更新します</small></span><span class="chev">↻</span></button>
  </div>

  <!-- 危険な操作 -->
  <div class="setgroup">その他</div>
  <div class="card">
    <button class="row tap" id="delUserBtn"><span class="rlabel danger">このユーザーを削除</span><span class="chev">›</span></button>
    <button class="row tap" id="delAllBtn"><span class="rlabel danger">すべてのユーザーを削除</span><span class="chev">›</span></button>
  </div>
  <div style="height:16px"></div>
  </div>
  <div class="sheetfoot">
    <button class="btn ghost slim block" id="setCloseBtn">閉じる</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
"use strict";
const CFG_KEY="diary_cfg_v2";
const dataKey=(uidv,note)=>"diary_data::"+(uidv||"local")+"::"+(note||"日記");
const WEATHER=["☀️ 晴れ","☁️ 曇り","🌧️ 雨","⛈️ 嵐","❄️ 雪","🌫️ 霧"];
const MOOD=[
  {v:"😊 5（最高）",e:"😊",l:"最高"},
  {v:"😄 4（良い）",e:"😄",l:"良い"},
  {v:"😐 3（普通）",e:"😐",l:"普通"},
  {v:"😟 2（悪い）",e:"😟",l:"いまいち"},
  {v:"😢 1（最悪）",e:"😢",l:"最悪"},
];
const DOW=["日","月","火","水","木","金","土"];

let cfg={users:[], currentId:"", theme:"light", lockHash:""};
let entries=[];
let editingId=null, query="", editPlaces=[];

function loadCfg(){
  let raw={};
  try{raw=JSON.parse(localStorage.getItem(CFG_KEY))||{};}catch(e){}
  cfg=Object.assign({users:[], currentId:"", theme:"light", lockHash:""}, raw);
  // migrate old single-user config (name/gasUrl/note/notes at top level)
  if((!cfg.users||!cfg.users.length) && (raw.name||raw.gasUrl||raw.note)){
    const u={id:uid(), name:raw.name||"", gasUrl:raw.gasUrl||"", note:raw.note||"日記", notes:raw.notes||["日記"]};
    cfg.users=[u]; cfg.currentId=u.id;
  }
  if(!cfg.users.length){
    const u={id:uid(), name:"", gasUrl:"", note:"日記", notes:["日記"]};
    cfg.users=[u]; cfg.currentId=u.id;
  }
  if(!cfg.users.find(u=>u.id===cfg.currentId)) cfg.currentId=cfg.users[0].id;
  // 旧バージョンが自動でつけた仮の名前は空にしてプレースホルダー表示に戻す
  cfg.users.forEach(u=>{ if(u.name==="ユーザー1") u.name=""; });
  migrateDataKeys();
}
/* 旧バージョンはデータをGAS URLで保存していた。ユーザーIDベースへ一度だけ移行する */
function migrateDataKeys(){
  if(cfg._migratedKeys) return;
  cfg.users.forEach(u=>{
    (u.notes||["日記"]).forEach(note=>{
      const newKey=dataKey(u.id,note);
      if(localStorage.getItem(newKey)!=null) return;
      const oldKey="diary_data::"+(u.gasUrl||"local")+"::"+(note||"日記");
      const old=localStorage.getItem(oldKey);
      if(old!=null){
        // 同じURL(空URL含む)を複数ユーザーが共有していた場合の誤移行を避けるため、
        // gasUrlが設定済みのユーザーのみ自動移行する（local共有バケットは移さない）
        if(u.gasUrl){ localStorage.setItem(newKey, old); }
      }
    });
  });
  cfg._migratedKeys=true; saveCfg();
}
function saveCfg(){localStorage.setItem(CFG_KEY,JSON.stringify(cfg));}
function cur(){return cfg.users.find(u=>u.id===cfg.currentId)||cfg.users[0];}
function loadData(){try{entries=JSON.parse(localStorage.getItem(dataKey(cur().id,cur().note)))||[];}catch(e){entries=[];}}
function saveData(){localStorage.setItem(dataKey(cur().id,cur().note),JSON.stringify(entries));}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function now(){return Date.now();}

function dowOf(s){const d=new Date(s+"T00:00:00");return isNaN(d)?"":DOW[d.getDay()];}
function fmtDate(s){const a=s.split("-");return (+a[1])+"月"+(+a[2])+"日";}
function splitMulti(v){return (v||"").split(/[、,]/).map(x=>x.trim()).filter(Boolean);}
function moodEmoji(v){return splitMulti(v).map(x=>{const m=MOOD.find(o=>o.v===x);return m?m.e:"";}).join("");}
function weatherEmoji(v){return splitMulti(v).map(x=>x.split(" ")[0]).join("");}
function todayStr(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function esc(s){return (s||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}
async function sha(t){const b=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(t));return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,"0")).join("");}

function renderHeader(){
  document.getElementById("hUser").innerHTML=esc(cur().name||"日記")+' <span class="caret">▾</span>';
  document.getElementById("hNote").textContent="📔 "+(cur().note||"日記");
}
function renderNotebar(){
  const bar=document.getElementById("notebar");
  const u=cur();
  const notes=u.notes&&u.notes.length?u.notes:["日記"];
  bar.innerHTML=notes.map(n=>'<div class="nbchip '+(n===u.note?"sel":"")+'" data-note="'+esc(n)+'">'+esc(n)+'</div>').join("")
    +'<div class="nbchip add" id="nbAdd">＋ 新しい日記</div>';
  bar.querySelectorAll("[data-note]").forEach(c=>c.onclick=()=>switchNote(c.dataset.note));
  document.getElementById("nbAdd").onclick=openNewNoteFromHome;
}
function openNewNoteFromHome(){
  renderUserSettingsList(); renderNoteList();
  openSheet("setSheet");
  setTimeout(()=>{ showNewNoteInput(true); document.getElementById("newNoteRow").scrollIntoView({block:"center"}); },120);
}
function switchNote(n){
  if(n===cur().note) return;
  cur().note=n; saveCfg(); loadData(); renderHeader(); renderNotebar(); render();
  if(cur().gasUrl) doSync().catch(()=>{});
}
function newNote(){ showNewNoteInput(true); }
function showNewNoteInput(on){
  const row=document.getElementById("newNoteRow");
  const btn=document.getElementById("newNoteBtn");
  if(!row) return;
  row.style.display=on?"flex":"none";
  btn.style.display=on?"none":"flex";
  if(on){const i=document.getElementById("newNoteInput");i.value="";setTimeout(()=>i.focus(),50);}
}
function createNote(){
  const n=(document.getElementById("newNoteInput").value||"").trim();
  if(!n){toast("名前を入れてね");return;}
  if(!cur().notes.includes(n)) cur().notes.push(n);
  cur().note=n; saveCfg(); loadData(); renderHeader(); renderNotebar(); render(); renderNoteList();
  showNewNoteInput(false);
  if(cur().gasUrl){ gasCall("createSheet",{note:n}).then(()=>doSync()).catch(()=>{}); }
  toast("「"+n+"」を作ったよ");
}
function renameNote(oldName){
  const n=(prompt("日記帳の名前を変更",oldName)||"").trim();
  if(!n||n===oldName) return;
  if(cur().notes.includes(n)){toast("同じ名前がすでにあります");return;}
  // ローカルのデータキーを移し替え
  let data=[];
  try{data=JSON.parse(localStorage.getItem(dataKey(cur().id,oldName)))||[];}catch(e){}
  localStorage.setItem(dataKey(cur().id,n),JSON.stringify(data));
  localStorage.removeItem(dataKey(cur().id,oldName));
  cur().notes=cur().notes.map(x=>x===oldName?n:x);
  if(cur().note===oldName) cur().note=n;
  saveCfg(); loadData(); renderHeader(); renderNotebar(); render(); renderNoteList();
  // GAS側のシート名も変更
  if(cur().gasUrl){ gasCall("renameSheet",{from:oldName,to:n}).then(()=>doSync()).catch(()=>{}); }
  toast("名前を変更したよ");
}

/* ---- users ---- */
function renderUserList(){
  const box=document.getElementById("userList");
  if(!box) return;
  box.innerHTML=cfg.users.map(u=>{
    const url=u.gasUrl?("☁️ "+shortUrl(u.gasUrl)):"⚠️ URL未設定";
    const isCur=u.id===cfg.currentId;
    return '<button class="userrow'+(isCur?' cur':'')+'" data-uid="'+u.id+'">'
      +'<span class="uravatar">'+esc((u.name||"?").slice(0,1))+'</span>'
      +'<span class="urtext"><b>'+esc(u.name||"(名前なし)")+'</b><span class="urlmini">'+esc(url)+'</span></span>'
      +'<span class="urcheck">'+(isCur?"✓":"")+'</span></button>';
  }).join("");
  box.querySelectorAll("[data-uid]").forEach(b=>b.onclick=()=>switchUser(b.dataset.uid));
}
/* 設定画面内のユーザー一覧（タップで選択し、下の入力欄に反映） */
function renderUserSettingsList(){
  const box=document.getElementById("userSettingsList");
  if(!box) return;
  box.innerHTML=cfg.users.map(u=>{
    const url=u.gasUrl?shortUrl(u.gasUrl):"URL未設定";
    const isCur=u.id===cfg.currentId;
    return '<button class="row tap'+(isCur?' selrow':'')+'" data-uid="'+u.id+'">'
      +'<span class="uravatar sm">'+esc((u.name||"?").slice(0,1))+'</span>'
      +'<span class="rtext"><b>'+esc(u.name||"(名前なし)")+'</b><small class="urlmini">'+esc(url)+'</small></span>'
      +'<span class="chev">'+(isCur?'✓':'›')+'</span></button>';
  }).join("")
  +'<button class="row tap" id="addUserRow"><span class="rlabel accent">＋ 新しいユーザーを追加</span><span class="chev">›</span></button>';
  box.querySelectorAll("[data-uid]").forEach(b=>b.onclick=()=>{ selectUser(b.dataset.uid); });
  const ar=document.getElementById("addUserRow");
  if(ar) ar.onclick=addUser;
}
function shortUrl(u){
  const m=u.match(/macros\/s\/([^\/]+)/);
  if(m) return "…"+m[1].slice(-8)+"/exec";
  return u.length>32?u.slice(0,30)+"…":u;
}
/* 設定画面内でユーザーを選択（切替＋入力欄反映） */
function selectUser(id){
  cfg.currentId=id; saveCfg();
  loadData(); refreshUserUI(); renderUserSettingsList(); renderNoteList();
  if(cur().gasUrl) doSync().catch(()=>{});
}
/* ヘッダーの切替シートからの切替 */
function switchUser(id){
  cfg.currentId=id; saveCfg();
  loadData(); refreshUserUI(); renderNoteList();
  closeSheets();
  if(cur().gasUrl) doSync().catch(()=>{});
  toast(cur().name+"に切り替えたよ");
}
function addUser(){
  const u={id:uid(), name:"", gasUrl:"", note:"日記", notes:["日記"]};
  cfg.users.push(u); cfg.currentId=u.id; saveCfg();
  loadData(); refreshUserUI(); renderUserSettingsList(); renderNoteList();
  toast("新しいユーザーを追加。名前とURLを入れて保存してね");
  setTimeout(()=>document.getElementById("cfgName").focus(),60);
}
function delUser(){
  if(cfg.users.length<=1){toast("最後のユーザーは削除できません");return;}
  if(!confirm("「"+(cur().name||"このユーザー")+"」を削除します。よい？（クラウドのデータは消えません）"))return;
  cfg.users=cfg.users.filter(u=>u.id!==cfg.currentId);
  cfg.currentId=cfg.users[0].id; saveCfg();
  loadData(); refreshUserUI(); renderUserSettingsList(); renderNoteList();
  toast("削除したよ");
}
function refreshUserUI(){
  renderHeader(); renderNotebar(); render();
  const nf=document.getElementById("cfgName");
  if(nf) nf.value=cur().name && cur().name.indexOf("(")<0 ? cur().name : "";
  const uf=document.getElementById("cfgUrl");
  if(uf) uf.value=cur().gasUrl||"";
}
function connectUrl(){
  const name=document.getElementById("cfgName").value.trim();
  const url=document.getElementById("cfgUrl").value.trim();
  cur().name=name||cur().name; cur().gasUrl=url; saveCfg();
  loadData(); renderHeader(); renderNotebar(); render(); renderUserSettingsList();
  if(!url){ toast("URLが空です。名前だけ保存しました"); return; }
  const snap=snapshot();
  toast("接続しています…");
  gasCallFor(snap,"sheets",{}).then(r=>{
    const tu=userById(snap.id);
    if(r&&r.ok&&tu){
      if(r.sheets) tu.notes=r.sheets;
      if(name){ gasCallFor(snap,"setName",{name}).catch(()=>{}); }
      else if(r.name){ tu.name=r.name; }
      saveCfg();
      if(stillCurrent(snap)){ refreshUserUI(); renderHeader(); renderNotebar(); renderUserSettingsList(); renderNoteList(); }
      else { renderUserSettingsList(); }
    }
    doSync().catch(()=>{});
  }).catch(()=>{ toast("接続できなかった。URLを確認してね"); });
}
function clearUrl(){
  const f=document.getElementById("cfgUrl");
  f.value=""; f.focus();
}
function delAllUsers(){
  if(!confirm("すべてのユーザー登録を削除して初期状態に戻します。よい？\n（クラウドのデータは消えません）"))return;
  if(!confirm("本当に全部消しますか？この操作は元に戻せません。"))return;
  const u={id:uid(), name:"", gasUrl:"", note:"日記", notes:["日記"]};
  cfg.users=[u]; cfg.currentId=u.id; saveCfg();
  loadData(); refreshUserUI(); renderUserSettingsList(); renderNoteList();
  toast("すべて削除しました");
}

function render(){
  const list=document.getElementById("list");
  let act=entries.filter(e=>!e.deleted && !e.trashed);
  const trash=entries.filter(e=>e.trashed).sort((a,b)=>(b.trashedAt||0)-(a.trashedAt||0));
  if(query){const q=query.toLowerCase();
    act=act.filter(e=>((e.body||"")+" "+(e.tags||"")+" "+(e.thanks||"")+" "+(e.goal||"")+" "+(e.places||"")+" "+(e.learned||"")+" "+(e.memorized||"")).toLowerCase().includes(q));}
  act.sort((a,b)=>(b.date||"").localeCompare(a.date||""));
  let html="";
  if(!act.length){
    html+='<div class="empty"><div class="big">📝</div><p>'+(query?"見つからなかったよ":"まだ日記がないよ。<br>＋ボタンで書いてみよう！")+'</p></div>';
  }else{
    let mcur="";
    for(const e of act){
      const mon=(e.date||"").slice(0,7);
      if(mon!==mcur){mcur=mon; const a=mon.split("-"); html+='<div class="daygroup">'+a[0]+'年'+(+a[1])+'月</div>';}
      const tags=(e.tags||"").split(/\s+/).filter(Boolean).map(t=>'<span class="tag">'+esc(t)+'</span>').join("");
      const places=splitMulti(e.places).map(p=>'<span class="tag">📍'+esc(p)+'</span>').join("");
      html+='<div class="entry" data-id="'+e.id+'">'
        +'<div class="top"><span class="date">'+fmtDate(e.date)+'</span>'
        +'<span class="dow">('+(e.dow||dowOf(e.date))+')</span>'
        +'<span class="badges">'+weatherEmoji(e.weather)+' '+moodEmoji(e.mood)+'</span></div>'
        +(places?'<div class="tags" style="margin-top:0;margin-bottom:8px">'+places+'</div>':"")
        +(e.body?'<div class="body">'+esc(e.body)+'</div>':"")
        +((e.learned||e.memorized||e.thanks||e.goal)?'<div class="meta">'
          +(e.learned?'<div><b>新しく知ったこと:</b> '+esc(e.learned)+'</div>':"")
          +(e.memorized?'<div><b>覚えたこと:</b> '+esc(e.memorized)+'</div>':"")
          +(e.thanks?'<div><b>感謝:</b> '+esc(e.thanks)+'</div>':"")
          +(e.goal?'<div><b>明日:</b> '+esc(e.goal)+'</div>':"")+'</div>':"")
        +(tags?'<div class="tags">'+tags+'</div>':"")
        +'</div>';
    }
  }
  // ゴミ箱
  if(trash.length){
    html+='<div class="trashhead">🗑️ 削除した日記（'+trash.length+'）</div>';
    for(const e of trash){
      const summary=(e.body||"(本文なし)").slice(0,40);
      html+='<div class="trashitem">'
        +'<div class="ttext"><span class="tdate">'+fmtDate(e.date)+'（'+(e.dow||dowOf(e.date))+'）</span>'
        +'<span class="tbody">'+esc(summary)+(((e.body||"").length>40)?"…":"")+'</span></div>'
        +'<div class="tacts"><button class="tbtn restore" data-restore="'+e.id+'">復元</button>'
        +'<button class="tbtn purge" data-purge="'+e.id+'">完全に削除</button></div>'
        +'</div>';
    }
  }
  list.innerHTML=html;
  list.querySelectorAll(".entry").forEach(el=>el.onclick=()=>openEdit(el.dataset.id));
  list.querySelectorAll("[data-restore]").forEach(b=>b.onclick=()=>restoreEntry(b.dataset.restore));
  list.querySelectorAll("[data-purge]").forEach(b=>b.onclick=()=>purgeEntry(b.dataset.purge));
}

function buildChips(){
  document.getElementById("weatherChips").innerHTML=WEATHER.map(w=>'<button type="button" class="chip" data-w="'+w+'">'+w.split(" ")[0]+'</button>').join("");
  document.getElementById("moodChips").innerHTML=MOOD.map(m=>'<button type="button" class="chip" data-m="'+m.v+'">'+m.e+'<small>'+m.l+'</small></button>').join("");
  document.querySelectorAll("#weatherChips .chip").forEach(c=>c.onclick=()=>c.classList.toggle("sel"));
  document.querySelectorAll("#moodChips .chip").forEach(c=>c.onclick=()=>c.classList.toggle("sel"));
}
function selChip(sel,val){
  const set=new Set(splitMulti(val));
  document.querySelectorAll(sel+" .chip").forEach(c=>{const v=c.dataset.w||c.dataset.m;c.classList.toggle("sel",set.has(v));});
}
function getChip(sel){
  return [...document.querySelectorAll(sel+" .chip.sel")].map(c=>c.dataset.w||c.dataset.m).join("、");
}

/* ---- places ---- */
function renderPlaces(){
  const box=document.getElementById("placeList");
  box.innerHTML=editPlaces.map((p,i)=>'<span class="placepill">'+esc(p)+'<button type="button" data-rm="'+i+'">✕</button></span>').join("");
  box.querySelectorAll("[data-rm]").forEach(b=>b.onclick=()=>{editPlaces.splice(+b.dataset.rm,1);renderPlaces();});
}
function addPlace(){
  const inp=document.getElementById("placeInput");
  const v=inp.value.trim();
  if(!v) return;
  if(!editPlaces.includes(v)) editPlaces.push(v);
  inp.value=""; inp.focus(); renderPlaces();
}

function openEdit(id){
  editingId=id;
  const e=id?entries.find(x=>x.id===id):null;
  document.getElementById("editTitle").textContent=e?"日記を直す":"今日の日記";
  document.getElementById("fDate").value=e?e.date:todayStr();
  document.getElementById("fBody").value=e?e.body||"":"";
  document.getElementById("fLearned").value=e?e.learned||"":"";
  document.getElementById("fMemorized").value=e?e.memorized||"":"";
  document.getElementById("fThanks").value=e?e.thanks||"":"";
  document.getElementById("fGoal").value=e?e.goal||"":"";
  document.getElementById("fTags").value=e?e.tags||"":"";
  editPlaces = e ? splitMulti(e.places) : [];
  renderPlaces();
  selChip("#weatherChips",e?e.weather:"☀️ 晴れ");
  selChip("#moodChips",e?e.mood:"😄 4（良い）");
  document.getElementById("delBtn").style.display=e?"block":"none";
  openSheet("editSheet");
}
function saveEntry(){
  const date=document.getElementById("fDate").value;
  if(!date){toast("日付を選んでね");return;}
  const data={date,dow:dowOf(date),weather:getChip("#weatherChips"),mood:getChip("#moodChips"),
    places:editPlaces.join("、"),
    body:document.getElementById("fBody").value.trim(),
    learned:document.getElementById("fLearned").value.trim(),
    memorized:document.getElementById("fMemorized").value.trim(),
    thanks:document.getElementById("fThanks").value.trim(),
    goal:document.getElementById("fGoal").value.trim(),tags:document.getElementById("fTags").value.trim(),
    updatedAt:now(),deleted:false};
  if(editingId){Object.assign(entries.find(x=>x.id===editingId),data);}
  else{entries.push(Object.assign({id:uid()},data));}
  saveData(); render(); closeSheets(); toast("保存したよ ✨");
  if(cur().gasUrl) autoSync();
}
function delEntry(){
  const e=entries.find(x=>x.id===editingId);
  if(e){e.trashed=true; e.trashedAt=now(); e.updatedAt=now();}
  saveData(); render(); closeSheets(); toast("ゴミ箱に入れたよ");
  if(cur().gasUrl) autoSync();   // GASからは削除される（送信時に除外＋deleted扱い）
}
function restoreEntry(id){
  const e=entries.find(x=>x.id===id);
  if(e){e.trashed=false; delete e.trashedAt; e.updatedAt=now();}
  saveData(); render(); toast("復元したよ");
  if(cur().gasUrl) autoSync();
}
function purgeEntry(id){
  entries=entries.filter(x=>x.id!==id);
  saveData(); render();   // 確認なしで完全削除（ローカルからも消す）
}

function openSheet(w){const bg=w==="setSheet"?"setBg":(w==="userSheet"?"userBg":"sheetBg");document.getElementById(bg).classList.add("on");document.getElementById(w).classList.add("on");}
function closeSheets(){["sheetBg","setBg","userBg"].forEach(i=>document.getElementById(i).classList.remove("on"));["editSheet","setSheet","userSheet"].forEach(i=>document.getElementById(i).classList.remove("on"));}
function applyTheme(){document.documentElement.setAttribute("data-theme",cfg.theme);document.getElementById("themeBtn").textContent=cfg.theme==="dark"?"☀️":"🌙";}
let toastT;function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("on");clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove("on"),1800);}
function setSync(s){document.getElementById("syncDot").textContent=s;}

function toPayload(e){return {id:e.id,date:e.date,dow:e.dow,weather:e.weather,mood:e.mood,places:e.places||"",body:e.body,learned:e.learned||"",memorized:e.memorized||"",thanks:e.thanks,goal:e.goal,tags:e.tags,updatedAt:e.updatedAt||0,deleted:!!(e.deleted||e.trashed)};}
function mergeRemote(remote){
  const byId=new Map(entries.map(e=>[e.id,e]));
  for(const r of remote){const c=byId.get(r.id);if(!c||(r.updatedAt||0)>(c.updatedAt||0))byId.set(r.id,r);}
  entries=[...byId.values()]; saveData(); render();
}
/* スナップショットしたユーザー/日記帳に対してGASを呼ぶ。応答時に切替が起きていたら破棄する */
async function gasCallFor(snap,action,body){
  if(!snap.gasUrl) throw new Error("no url");
  const res=await fetch(snap.gasUrl,{method:"POST",redirect:"follow",
    headers:{"Content-Type":"text/plain;charset=utf-8"},
    body:JSON.stringify(Object.assign({action,note:snap.note},body))});
  return res.json();
}
function snapshot(){const u=cur();return {id:u.id, note:u.note, gasUrl:u.gasUrl};}
function stillCurrent(snap){return cfg.currentId===snap.id && cur().note===snap.note;}
function userById(id){return cfg.users.find(u=>u.id===id);}
/* スナップショット対象ユーザーのデータをlocalStorageから読む（表示中とは限らない） */
function readFor(snap){try{return JSON.parse(localStorage.getItem(dataKey(snap.id,snap.note)))||[];}catch(e){return [];}}
function writeFor(snap,arr){localStorage.setItem(dataKey(snap.id,snap.note),JSON.stringify(arr));}

async function gasCall(action,body){
  const u=cur();
  if(!u.gasUrl){toast("先にGAS URLを入れてね");throw new Error("no url");}
  return gasCallFor(snapshot(),action,body);
}

async function doSync(){
  const snap=snapshot();
  if(!snap.gasUrl){toast("先にGAS URLを入れてね");return;}
  setSync("同期中…");
  try{
    const local=readFor(snap).map(toPayload);
    const r=await gasCallFor(snap,"sync",{entries:local});
    if(r&&r.ok){
      // マージは「送信したユーザーの保存データ」に対して行い、表示中ユーザーに依存しない
      const localArr=readFor(snap);
      const byId=new Map(localArr.map(e=>[e.id,e]));
      const trashedIds=new Set(localArr.filter(e=>e.trashed).map(e=>e.id));
      (r.entries||[]).forEach(rm=>{
        if(rm.deleted) return;                 // GAS側で削除済みは取り込まない
        if(trashedIds.has(rm.id)) return;      // ローカルでゴミ箱中のものは復活させない
        const c=byId.get(rm.id);
        if(!c||(rm.updatedAt||0)>(c.updatedAt||0)) byId.set(rm.id, rm);
      });
      const merged=[...byId.values()];
      writeFor(snap,merged);
      const tu=userById(snap.id);
      if(tu){
        if(r.sheets&&r.sheets.length) tu.notes=r.sheets;
        if(r.name) tu.name=r.name;
        saveCfg();
      }
      // 表示中ユーザー＆日記帳が一致するときだけ画面に反映
      if(stillCurrent(snap)){ entries=merged; render(); renderHeader(); renderNotebar(); }
      setSync("✅"); setTimeout(()=>setSync(""),2000);
    } else throw new Error(r&&r.error);
  }catch(e){setSync("⚠️");toast("同期できなかった。URLとネットを確認してね");setTimeout(()=>setSync(""),2500);}
}
async function doPull(){
  const snap=snapshot();
  if(!snap.gasUrl){toast("先にGAS URLを入れてね");return;}
  setSync("取得中…");
  try{
    const r=await gasCallFor(snap,"pull",{});
    if(r&&r.ok){
      // クラウドで上書きしつつ、ローカルのゴミ箱は保持する
      const trashed=readFor(snap).filter(e=>e.trashed);
      const trashedIds=new Set(trashed.map(e=>e.id));
      const fresh=(r.entries||[]).filter(e=>!trashedIds.has(e.id)).concat(trashed);
      writeFor(snap, fresh);
      const tu=userById(snap.id);
      if(tu){ if(r.sheets) tu.notes=r.sheets; if(r.name) tu.name=r.name; saveCfg(); }
      if(stillCurrent(snap)){ entries=fresh; render(); renderNotebar(); renderHeader(); }
      setSync("✅");toast("取得したよ");setTimeout(()=>setSync(""),2000);
    } else throw 0;
  }
  catch(e){setSync("⚠️");toast("取得できなかった");setTimeout(()=>setSync(""),2500);}
}
async function doPush(){
  const snap=snapshot();
  if(!snap.gasUrl){toast("先にGAS URLを入れてね");return;}
  setSync("送信中…");
  try{
    const r=await gasCallFor(snap,"push",{entries:readFor(snap).map(toPayload)});
    if(r&&r.ok){setSync("✅");toast("送信したよ");setTimeout(()=>setSync(""),2000);}else throw 0;
  }
  catch(e){setSync("⚠️");toast("送信できなかった");setTimeout(()=>setSync(""),2500);}
}
let autoT, autoSnap;
function autoSync(){autoSnap=snapshot();clearTimeout(autoT);autoT=setTimeout(()=>doSync().catch(()=>{}),1200);}

async function refreshNotes(){
  if(!cur().gasUrl){toast("先にGAS URLを入れてね");return;}
  try{const r=await gasCall("sheets",{});if(r&&r.ok&&r.sheets){cur().notes=r.sheets;if(r.name){cur().name=r.name;renderHeader();}saveCfg();renderNotebar();renderNoteList();toast("一覧を更新したよ");}}
  catch(e){toast("一覧を取得できなかった");}
}
function renderNoteList(){
  const u=cur();
  const box=document.getElementById("noteList");
  if(!box) return;
  box.innerHTML=(u.notes||["日記"]).map(n=>
    '<div class="row noterow"><span class="rlabel" data-sw="'+esc(n)+'">'+(n===u.note?'<b>'+esc(n)+'</b>':esc(n))+'</span>'
    +'<button class="miniedit" data-rn="'+esc(n)+'">✏️</button>'
    +(n===u.note?'<span class="chev" style="color:var(--accent)">✓</span>':'<span class="chev" data-sw2="'+esc(n)+'">›</span>')+'</div>').join("");
  box.querySelectorAll("[data-sw]").forEach(b=>b.onclick=()=>{switchNote(b.dataset.sw);renderNoteList();});
  box.querySelectorAll("[data-sw2]").forEach(b=>b.onclick=()=>{switchNote(b.dataset.sw2);renderNoteList();});
  box.querySelectorAll("[data-rn]").forEach(b=>b.onclick=(ev)=>{ev.stopPropagation();renameNote(b.dataset.rn);});
}

function exportJSON(){
  const blob=new Blob([JSON.stringify(entries,null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download="diary_"+(cur().name||"")+"_"+(cur().note||"日記")+"_"+todayStr()+".json";a.click();toast("書き出したよ");
}
function importJSON(file){const fr=new FileReader();fr.onload=()=>{try{mergeRemote(JSON.parse(fr.result));toast("読み込んだよ");}catch(e){toast("ファイルが読めなかった");}};fr.readAsText(file);}

function refreshLockState(){
  const on=!!cfg.lockHash;
  document.getElementById("lockState").textContent=on?"ロック中（タップで解除）":"オフ（タップで合言葉を設定）";
  document.getElementById("lockChev").textContent=on?"🔒":"›";
}
async function toggleLock(){
  if(cfg.lockHash){
    const p=prompt("今の合言葉を入力（解除します）");
    if(p===null) return;
    if(await sha(p)!==cfg.lockHash){toast("合言葉がちがうよ");return;}
    cfg.lockHash=""; saveCfg(); refreshLockState(); toast("ロックを解除したよ");
  }else{
    const p=(prompt("新しい合言葉を決めてね")||"").trim();
    if(!p) return;
    const p2=prompt("もう一度入力してね");
    if(p!==p2){toast("合言葉が一致しないよ");return;}
    cfg.lockHash=await sha(p); saveCfg(); refreshLockState(); toast("ロックを設定したよ");
  }
}
async function tryUnlock(){
  const v=document.getElementById("lockInput").value;
  if(await sha(v)===cfg.lockHash){document.getElementById("lock").classList.remove("on");document.getElementById("lockInput").value="";document.getElementById("lockErr").textContent="";}
  else{document.getElementById("lockErr").textContent="合言葉がちがいます";document.getElementById("lockInput").value="";}
}

function init(){
  loadCfg(); applyTheme(); buildChips(); loadData();
  renderHeader(); renderNotebar(); render();

  if(cfg.lockHash){document.getElementById("lock").classList.add("on");setTimeout(()=>document.getElementById("lockInput").focus(),200);}

  document.getElementById("cfgName").value=cur().name && cur().name.indexOf("(")<0 ? cur().name : "";
  document.getElementById("cfgUrl").value=cur().gasUrl||"";
  refreshLockState();

  document.getElementById("addBtn").onclick=()=>openEdit(null);
  document.getElementById("placeAddBtn").onclick=addPlace;
  document.getElementById("placeInput").addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();addPlace();}});
  document.getElementById("saveBtn").onclick=saveEntry;
  document.getElementById("cancelBtn").onclick=closeSheets;
  document.getElementById("delBtn").onclick=delEntry;
  document.getElementById("userBtn").onclick=()=>{renderUserList();openSheet("userSheet");};
  document.getElementById("delUserBtn").onclick=delUser;
  document.getElementById("delAllBtn").onclick=delAllUsers;
  document.getElementById("connectBtn").onclick=connectUrl;
  document.getElementById("urlClearBtn").onclick=clearUrl;
  document.getElementById("nameClearBtn").onclick=()=>{const f=document.getElementById("cfgName");f.value="";f.focus();};
  document.getElementById("setCloseBtn").onclick=closeSheets;
  document.getElementById("setBtn").onclick=()=>{renderUserSettingsList();renderNoteList();openSheet("setSheet");};
  document.getElementById("sheetBg").onclick=closeSheets;
  document.getElementById("setBg").onclick=closeSheets;
  document.getElementById("userBg").onclick=closeSheets;
  document.getElementById("themeBtn").onclick=()=>{cfg.theme=cfg.theme==="dark"?"light":"dark";saveCfg();applyTheme();};
  document.getElementById("search").oninput=e=>{query=e.target.value;render();};

  document.getElementById("cfgName").onchange=()=>{cur().name=document.getElementById("cfgName").value.trim();saveCfg();renderHeader();renderUserSettingsList();};
  document.getElementById("syncBtn").onclick=doSync;
  document.getElementById("pullBtn").onclick=()=>{if(confirm("クラウドの内容でローカルを上書きします。よい？"))doPull();};
  document.getElementById("pushBtn").onclick=()=>{if(confirm("ローカルの内容でクラウドを上書きします。よい？"))doPush();};
  document.getElementById("refreshNotesBtn").onclick=refreshNotes;
  document.getElementById("newNoteBtn").onclick=newNote;
  document.getElementById("newNoteSave").onclick=createNote;
  document.getElementById("newNoteCancel").onclick=()=>showNewNoteInput(false);
  document.getElementById("newNoteInput").addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();createNote();}});
  document.getElementById("lockToggleBtn").onclick=toggleLock;
  document.getElementById("exportBtn").onclick=exportJSON;
  document.getElementById("importBtn").onclick=()=>document.getElementById("importFile").click();
  document.getElementById("importFile").onchange=e=>{if(e.target.files[0])importJSON(e.target.files[0]);e.target.value="";};
  document.getElementById("updateAppBtn").onclick=updateApp;

  document.getElementById("lockBtn").onclick=tryUnlock;
  document.getElementById("lockInput").addEventListener("keydown",e=>{if(e.key==="Enter")tryUnlock();});

  if(cur().gasUrl) doSync().catch(()=>{});
}
async function updateApp(){
  toast("更新を確認しています…");
  try{
    if('serviceWorker' in navigator){
      const regs=await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(r=>r.update().catch(()=>{})));
      // キャッシュを消して最新を取り直す
      if(window.caches){ const keys=await caches.keys(); await Promise.all(keys.map(k=>caches.delete(k))); }
      await Promise.all(regs.map(r=>r.unregister().catch(()=>{})));
    }
  }catch(e){}
  toast("最新版に更新します");
  setTimeout(()=>location.reload(), 600);
}

init();

// PWA: Service Worker 登録（オフライン対応）
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
